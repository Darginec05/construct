name: Feature request
description: Propose a new capability or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the **problem** first, not just the solution — especially for anything
        that touches the DSL or the safety/tier model. That's where design discussion
        matters most.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what's getting in the way today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Sketch the shape of it.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Where does this land?
      options:
        - "DSL / Flow contract"
        - "Engine / runtime"
        - "Nodes / executors"
        - "Providers (LLMs)"
        - "Tools / MCP / integrations"
        - "RAG / retrieval"
        - "SDK / server"
        - "Editor"
        - "Docs"
        - "Other"
    validations:
      required: true
  - type: checkboxes
    id: contract-impact
    attributes:
      label: Contract impact
      options:
        - label: This change would modify the DSL schema (`SCHEMA_VERSION` may need a bump)
        - label: This change touches the tool tier / human-approval safety model
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed and why you set them aside.
    validations:
      required: false
